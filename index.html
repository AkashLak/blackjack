<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackjack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="table-felt">

    <!-- Header -->
    <header class="game-header">
      <h1 class="game-title">Blackjack</h1>
      <p class="game-subtitle">6-Deck Shoe · Dealer Hits Soft 17 · Blackjack Pays 3:2</p>
    </header>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">Chips</span>
        <span class="hud-value" id="chips-amount">$1,000</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Bet</span>
        <span class="hud-value" id="bet-amount">$0</span>
      </div>
    </div>

    <!-- Message Area -->
    <div id="message-area" class="message-area"></div>

    <!-- Dealer Section -->
    <section class="dealer-section">
      <div class="section-label">Dealer</div>
      <div id="dealer-hand" class="hand-area"></div>
    </section>

    <!-- Divider -->
    <div class="table-divider">
      <span>♠ ♥ ♣ ♦</span>
    </div>

    <!-- Player Section -->
    <section class="player-section">
      <div class="section-label">Player</div>
      <div id="player-hands" class="hand-area multi-hand"></div>
    </section>

    <!-- Insurance Controls -->
    <div id="insurance-controls" class="insurance-controls" style="display:none;">
      <p class="insurance-text">Dealer shows Ace — Take Insurance? (Costs half your bet)</p>
      <div class="insurance-buttons">
        <button id="btn-insurance-yes" class="btn btn-yes">Take Insurance</button>
        <button id="btn-insurance-no" class="btn btn-no">Decline</button>
      </div>
    </div>

    <!-- Action Buttons (during play) -->
    <div id="action-buttons" class="action-buttons" style="display:none;">
      <button id="btn-hit" class="btn btn-primary">Hit <kbd>H</kbd></button>
      <button id="btn-stand" class="btn btn-secondary">Stand <kbd>S</kbd></button>
      <button id="btn-double" class="btn btn-accent">Double <kbd>D</kbd></button>
      <button id="btn-split" class="btn btn-accent">Split <kbd>P</kbd></button>
    </div>

    <!-- Betting Controls -->
    <div id="bet-controls" class="bet-controls">
      <div id="chip-buttons" class="chip-buttons"></div>
      <div class="bet-actions">
        <button id="clear-bet-btn" class="btn btn-ghost">Clear Bet</button>
        <button id="allin-btn" class="btn btn-ghost">All In</button>
        <button id="deal-btn" class="btn btn-deal">Deal ↵</button>
      </div>
    </div>

    <!-- New Round Button -->
    <div id="new-round-btn" class="new-round-wrap" style="display:none;">
      <button class="btn btn-deal" onclick="newRound()">New Round ↵</button>
    </div>

  </div>

  <!-- Scripts (order matters!) -->
  <script src="js/deck.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
